<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ionod Devman</title>
  <link rel="stylesheet" href="./devman.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">ionod devman</div>
      <h1>Remote device console</h1>
      <p class="lead">Log into an ionod node, inspect the raw endpoints it exposes, and open a supported device UI directly in the browser.</p>
      <form id="loginForm" class="stack">
        <label>
          <span>Address</span>
          <input id="addressInput" name="address" type="text" placeholder="pumpdemo.ionod.se" autocomplete="url" required>
        </label>
        <label>
          <span>Username</span>
          <input id="usernameInput" name="username" type="text" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button id="loginButton" type="submit">Log in and list supported endpoints</button>
      </form>
      <div id="status" class="status"></div>
    </section>

    <section class="panel panel-alt">
      <div class="section-head">
        <div>
          <div class="eyebrow">Supported endpoints</div>
          <h2 id="resultsTitle">Sign in to a node</h2>
        </div>
      </div>
      <div id="results" class="results empty">
        <p>Only supported devices compiled into this static build are shown here.</p>
      </div>
    </section>
  </main>
  <script src="./devman.js"></script>
</body>
</html>
