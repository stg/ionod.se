<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ionod device manager</title>
  <link rel="stylesheet" href="./devman.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">ionod device manager</div>
      <form id="loginForm" class="stack">
        <label>
          <span>Hostname</span>
          <input id="addressInput" name="address" type="text" autocomplete="url" required>
        </label>
        <label>
          <span>Username</span>
          <input id="usernameInput" name="username" type="text" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button id="loginButton" type="submit">Access</button>
      </form>
      <div id="status" class="status"></div>
    </section>

    <section class="panel panel-alt">
      <div class="section-head">
        <div>
          <div class="eyebrow">Devices</div>
          <h2 id="resultsTitle">Sign in to a node</h2>
        </div>
      </div>
      <div id="results" class="results empty">
        <p>No available devices.</p>
      </div>
    </section>
  </main>
  <script src="./devman.js"></script>
</body>
</html>
